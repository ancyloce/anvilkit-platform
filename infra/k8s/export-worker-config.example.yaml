# Non-secret §14 configuration for a deployed environment (example — real
# values land with the first deployed environment, BD-006 gate). Secrets
# (INTERNAL_SERVICE_TOKEN, S3_ACCESS_KEY, S3_SECRET_KEY) are NEVER here:
# they arrive via the anvilkit-export-worker-secrets Secret per ADR-006.
apiVersion: v1
kind: ConfigMap
metadata:
  name: anvilkit-export-worker-config
  labels:
    app.kubernetes.io/name: export-worker
    app.kubernetes.io/part-of: anvilkit-platform
data:
  ENVIRONMENT: "staging" # drives demo-guard strictness (ADR-010)
  QUEUE_DRIVER: "redis"
  REDIS_URL: "redis://redis:6379"
  RENDER_ORIGIN_URL: "http://render-origin:3000" # never apps/demo (FR-019)
  DEPLOYMENT_SERVICE_URL: "http://deployment-service:8080"
  ASSET_SERVICE_URL: "http://asset-service:8080"
  ARTIFACT_STORAGE_DRIVER: "s3"
  S3_ENDPOINT: "http://minio:9000"
  ARTIFACT_BUCKET: "anvilkit-artifacts"
  WORKER_CONCURRENCY: "4"
  LOG_LEVEL: "info"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
