# anvilkit-export-worker Deployment — the M4 probe/drain slice of EW-K8S-002
# (values from the ADR-012 proposal: 2 replicas, 250m/256Mi requests,
# 1 CPU/1Gi limits at WORKER_CONCURRENCY=4; sizing is re-validated in staging
# at M5). Secrets are injected per ADR-006 — never from the repo; the
# referenced Secret (anvilkit-export-worker-secrets: INTERNAL_SERVICE_TOKEN,
# S3_ACCESS_KEY, S3_SECRET_KEY) is created by the secret manager, and the
# ConfigMap carries the non-secret §14 configuration (see
# export-worker-config.example.yaml).
#
# No Service object on purpose: the worker exposes no public API (FR-018);
# health (8081) and metrics (9091) are cluster-internal pod ports.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: export-worker
  labels:
    app.kubernetes.io/name: export-worker
    app.kubernetes.io/part-of: anvilkit-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: export-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: export-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: /metrics
    spec:
      # Rolling updates rely on the SIGTERM graceful drain (FR-017,
      # AC-014-verified): stop consuming, finish in-flight jobs (bounded by
      # the lock TTL), release locks, exit 0.
      terminationGracePeriodSeconds: 90
      containers:
        - name: export-worker
          image: ghcr.io/ancyloce/anvilkit-export-worker:IMAGE_TAG # immutable tag (ADR-008); never :latest
          envFrom:
            - configMapRef:
                name: anvilkit-export-worker-config
            - secretRef:
                name: anvilkit-export-worker-secrets
          ports:
            - name: health
              containerPort: 8081
            - name: metrics
              containerPort: 9091
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
