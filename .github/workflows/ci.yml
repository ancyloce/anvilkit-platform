# Platform CI (EW-REPO-003/004, EW-CONTRACT-004/005 + M2 additions; ADR-008:
# GitHub Actions). Stages per PLAN-0001 §10. The worker repo (submodule)
# carries its own CI; this pipeline owns the contracts (validation, codegen
# drift, freeze), the mocks module, the monorepo-wide dependency audit, the
# worker build/test against the pinned submodule, and the container image
# builds (build-only; publishing joins with the first deployed environment).
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contracts:
    name: Contracts (validate, codegen drift, freeze)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/export-worker/go.mod
      - name: Validate fixtures + regenerate Go bindings
        run: bun packages/contracts-codegen/generate.ts
      - name: Contract freeze intact (ADR-001, AC-029)
        run: bun packages/contracts-codegen/check-freeze.ts
      - name: No codegen drift (platform)
        run: git diff --exit-code
      - name: No codegen drift (worker submodule)
        run: git -C services/export-worker diff --exit-code

  worker:
    name: Worker (lint, vet, unit + integration, build)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/export-worker/go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          working-directory: services/export-worker
      - name: Start MinIO (storage/export integration tests)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
      - name: go vet
        working-directory: services/export-worker
        run: go vet ./...
      - name: Unit + integration tests (race detector)
        working-directory: services/export-worker
        env:
          REDIS_TEST_URL: redis://localhost:6379
          S3_TEST_ENDPOINT: http://localhost:9000
        run: go test -race -count=1 ./...
      - name: Build
        working-directory: services/export-worker
        run: go build ./...

  mocks:
    name: Mocks (contract conformance, FR-022)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/export-worker/go.mod
      - name: go vet
        working-directory: mocks
        run: go vet ./...
      - name: Conformance tests (driven through generated clients)
        working-directory: mocks
        run: go test -race -count=1 ./...
      - name: Build
        working-directory: mocks
        run: go build ./...

  images:
    name: Container images (build-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Worker image (EW-K8S-001)
        run: docker build --build-arg VERSION=${{ github.sha }} -t anvilkit-export-worker:${{ github.sha }} services/export-worker
      - name: deployment-service-mock image
        run: docker build -f mocks/Dockerfile --build-arg SERVICE=deployment-service-mock -t anvilkit-deployment-service-mock:${{ github.sha }} .
      - name: asset-service-mock image
        run: docker build -f mocks/Dockerfile --build-arg SERVICE=asset-service-mock -t anvilkit-asset-service-mock:${{ github.sha }} .
      - name: render-origin-mock image
        run: docker build -f mocks/Dockerfile --build-arg SERVICE=render-origin-mock -t anvilkit-render-origin-mock:${{ github.sha }} .
      - name: Compose config validation
        run: docker compose -f infra/docker-compose.yml config --quiet
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/export-worker/go.mod
      - name: Kubernetes manifest validation (kubeconform)
        run: |
          go install github.com/yannh/kubeconform/cmd/kubeconform@latest
          sed 's/IMAGE_TAG/ci-validation/' infra/k8s/export-worker-deployment.yaml | \
            $(go env GOPATH)/bin/kubeconform -strict -summary -
          $(go env GOPATH)/bin/kubeconform -strict -summary infra/k8s/export-worker-config.example.yaml
      - name: Alert rules validation (promtool)
        run: |
          docker run --rm -v "$PWD/infra/alerts:/rules:ro" --entrypoint promtool \
            prom/prometheus:latest check rules /rules/export-worker-rules.yaml

  audit:
    name: Dependency audit (AC-002, AC-018)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/export-worker/go.mod
      - name: Platform + worker dependency audit
        run: bun scripts/dependency-audit.ts
      - name: govulncheck (worker)
        working-directory: services/export-worker
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
